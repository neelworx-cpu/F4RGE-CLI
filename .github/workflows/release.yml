name: release

on:
  push:
    tags:
      - v*.*.*

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Build installer artifacts
        run: |
          scripts/package-release.sh "${GITHUB_REF_NAME}"
          scripts/package-release.sh latest
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 \
            && gh release upload "${GITHUB_REF_NAME}" dist/cli/* --clobber \
            || gh release create "${GITHUB_REF_NAME}" dist/cli/* --title "${GITHUB_REF_NAME}" --notes "F4RGE CLI ${GITHUB_REF_NAME}" --latest --verify-tag
      - name: Upload installer artifacts to Vercel Blob
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          test -n "$BLOB_READ_WRITE_TOKEN"
          npx --yes @vercel/blob@latest put --token "$BLOB_READ_WRITE_TOKEN" --pathname cli --multipart dist/cli/*
